# shopify.app.toml
name = "AutoSync"
client_id = "3d4144a7a7c710f6845015c9d54098f8"
application_url = "https://autosync-v3.vercel.app"
embedded = true

[access_scopes]
scopes = "write_products,read_products,read_themes,write_themes,read_content,write_content,read_metaobjects,write_metaobjects"

[auth]
redirect_urls = [
  "https://autosync-v3.vercel.app/auth/callback",
  "http://localhost:3000/auth/callback"
]

[webhooks]
api_version = "2026-01"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/webhooks/app/uninstalled"

[[webhooks.subscriptions]]
topics = ["app_subscriptions/update"]
uri = "/webhooks/app/subscriptions-update"

[[webhooks.subscriptions]]
topics = ["products/create", "products/update", "products/delete"]
uri = "/webhooks/products"

[webhooks.privacy_compliance]
customer_deletion_url = "/webhooks/customers/redact"
customer_data_request_url = "/webhooks/customers/data_request"
shop_deletion_url = "/webhooks/shop/redact"

[app_proxy]
url = "https://autosync-v3.vercel.app/proxy"
subpath = "autosync"
prefix = "apps"

[pos]
embedded = false
